name: Main CI

on:
  push:
    branches:
      - master
    tags:
      - v[0-9]+.[0-9]+.[0-9]+
      - v[0-9]+.[0-9]+.[0-9]+-alpha.[0-9]+
      - v[0-9]+.[0-9]+.[0-9]+-beta.[0-9]+
      - v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+
  pull_request:
    branches:
      - master

env:
  PUPPETEER_SKIP_DOWNLOAD: 'true'

jobs:
  lint:
    name: Lint code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'yarn'
      - run: yarn install --frozen-lockfile --prefer-offline
      - run: yarn lint
  test:
    name: Run tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [lts/*, current]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'
      - run: yarn install --frozen-lockfile --prefer-offline
      # ubuntu-latest ships Google Chrome preinstalled; point Puppeteer at it rather than downloading a build, whose extraction has proven unreliable on hosted runners
      - name: Use the runner's preinstalled Chrome
        run: |
          CHROME="$(command -v google-chrome-stable || command -v google-chrome || true)"
          if [ -z "$CHROME" ]; then
            echo "::error::No preinstalled Google Chrome found on the runner"
            exit 1
          fi
          echo "Using chrome version $("$CHROME" --version) at $CHROME"
          echo "PUPPETEER_EXECUTABLE_PATH=$CHROME" >> "$GITHUB_ENV"
      - run: yarn test
      - name: Codecov
        uses: codecov/codecov-action@v3
  verify-website:
    name: Verify website
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'yarn'
      - run: yarn dev
      - run: yarn --cwd ./website type-check
      - run: yarn --cwd ./website build
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
      - verify-website
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'yarn'
          registry-url: 'https://registry.npmjs.org'
      - run: yarn install --frozen-lockfile --prefer-offline
      - run: yarn compile
      - run: |
          if [[ "$GITHUB_REF" =~ -alpha ]]; then
            npm publish --tag alpha
          elif [[ "$GITHUB_REF" =~ -beta ]]; then
            npm publish --tag beta
          else
            npm publish
          fi
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
      - verify-website
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'yarn'
          registry-url: 'https://registry.npmjs.org'
      - run: yarn dev
      - run: yarn --cwd ./website build
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@4.0.0
        with:
          branch: gh-pages
          folder: website/build
